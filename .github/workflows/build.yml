name: Build and Export IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Xcode 선택
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Gecko 빌드 캐시 복원
        id: gecko-cache
        uses: actions/cache/restore@v4
        with:
          path: engine/firefox/obj-aarch64-apple-ios
          key: gecko-${{ hashFiles('engine/release.txt') }}

      - name: Gecko 캐시 없음 경고
        if: steps.gecko-cache.outputs.cache-hit != 'true'
        run: |
          echo "::warning::Gecko 사전 빌드 캐시가 없습니다."
          echo "Gecko dist 없이 xcodebuild를 시도합니다."

      - name: Rust 설정
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: idevice 서브모듈 초기화
        run: git submodule update --init support/idevice

      - name: idevice FFI 빌드
        working-directory: support/idevice/ffi
        env:
          IPHONEOS_DEPLOYMENT_TARGET: "14.0"
          RUSTFLAGS: "-C link-arg=-miphoneos-version-min=14.0"
        run: |
          cargo build --release --target aarch64-apple-ios --no-default-features --features full,ring
          mkdir -p "$GITHUB_WORKSPACE/browser/Reynard/JIT"
          cp ../target/aarch64-apple-ios/release/libidevice_ffi.a "$GITHUB_WORKSPACE/browser/Reynard/JIT/"

      - name: 프로젝트 빌드 (서명 없이)
        run: |
          xcodebuild -project browser/Reynard.xcodeproj \
            -scheme Reynard \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Reynard.xcarchive \
            -derivedDataPath build/DerivedData \
            archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: IPA 수동 생성
        run: |
          rm -rf Payload build/ipa
          mkdir -p build/ipa Payload
          cp -r build/Reynard.xcarchive/Products/Applications/Reynard.app Payload/
          chmod -R 755 Payload/Reynard.app
          (cd . && zip -r build/ipa/Reynard.ipa Payload)

      - name: IPA 업로드
        uses: actions/upload-artifact@v4
        with:
          name: reynard-ipa
          path: build/ipa/Reynard.ipa

      - name: 다운로드 링크 summary에 출력
        run: |
          echo "### 다운로드 링크" >> "$GITHUB_STEP_SUMMARY"
          echo "[Reynard.ipa 다운로드](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
